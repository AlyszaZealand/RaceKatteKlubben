<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Medlemsliste</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:insert="~{parts/navigation::navigation}"></div>

<h1 style="text-align: center; color: rebeccapurple; font-size: 30px; margin-top: 10px;">Vores Medlemmer</h1>

<table border="1" class="member-table">
    <thead>
    <tr>
        <th>Navn</th>
        <th>Email</th>
        <th>Beskrivelse</th>
        <th>Katte</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="member : ${members}">
        <td th:text="${member.username}"></td>
        <td th:text="${member.email}"></td>
        <td th:text="${member.memberDescription}"></td>
        <td>

            <ul>
                <li th:each="cat : ${member.catList}">
                    <a th:href="@{/CatProfile/{id}(id=${cat.catID})}">
                        <!-- Small thumbnail if image exists -->
                        <img th:if="${cat.imageName != null}"
                             th:src="${cat.imageName}"
                             width="40" height="40"
                             style="border-radius: 50%; object-fit: cover; margin-right: 8px; vertical-align: middle;">

                        <!-- Placeholder if no image -->
                        <span th:if="${cat.imageName == null}"
                              style="display:inline-block; width:40px; height:40px; background:#ccc; border-radius:50%; margin-right:8px; vertical-align:middle;">
                        </span>

                        <span th:text="${cat.catName} + ' (' + ${cat.calculateCatAge()} + ' år gammel)'"></span>
                    </a>
                </li>
            </ul>
        </td>
    </tr>
    </tbody>
</table>

<div th:insert="~{parts/footer :: footer}" style="text-align: center; margin-bottom: 20px;"></div>
</body>
</html>
