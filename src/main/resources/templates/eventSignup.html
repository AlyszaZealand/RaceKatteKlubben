<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <title>Event Tilmelding</title>
</head>
<body>
<div th:insert="~{parts/navigation::navigation}"></div>

<h1 th:text="${event.eventName}" style="text-align: center; color: rebeccapurple; font-size: 40px; margin-top: 20px;">Event navn</h1><br>

<hr><br>

<p><strong style="text-align: center">Dato:</strong> <span th:text="${event.eventDate}"></span></p>
<p><strong>Beskrivelse:</strong> <span th:text="${event.eventDescription}"></span></p><br>

<hr><br>

<h2 style="text-align: center; color: rebeccapurple">Tilmeld dine katte</h2>

<div th:if="${myCats.isEmpty()}">
    <p>Du har ingen katte registreret på din profil endnu.</p>
    <a href="/registerKat">Klik her for at oprette en kat</a>
</div>

<table border="1" th:unless="${myCats.isEmpty()}" class="cat-table">
    <thead>
    <tr>
        <th>Din Kat</th>
        <th>Handling</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="cat : ${myCats}">
        <td th:text="${cat.catName}"></td>
        <td>
            <form th:if="${!signedUpCatIds.contains(cat.catID)}" action="/events/signup" method="post" style="display:inline;">
                <input type="hidden" name="eventID" th:value="${event.eventID}">
                <input type="hidden" name="catID" th:value="${cat.catID}">
                <button type="submit" style="background-color: #4CAF50; color: white;">Tilmeld til event</button>
            </form>

            <form th:if="${signedUpCatIds.contains(cat.catID)}" action="/events/remove" method="post" style="display:inline;">
                <input type="hidden" name="eventID" th:value="${event.eventID}">
                <input type="hidden" name="catID" th:value="${cat.catID}">
                <button type="submit" style="background-color: #f44336; color: white;">Afmeld kat</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<hr>

<h3 style="text-align: center; color: rebeccapurple; font-size: 30px; margin-top: 10px;">Tilmeldte Katte</h3>


<ul th:if="${attendingCats != null}" >
    <li th:each="attendingCat : ${attendingCats}">
        <strong th:text="${attendingCat.catName}"></strong> <span th:text="'(' + ${attendingCat.calculateCatAge()} + ' år gammel)'"></span>
    </li>
</ul>
<p th:if="${attendingCats == null || attendingCats.isEmpty()}" style="text-align: center">Der er ingen katte tilmeldt endnu.</p>

<br>
<div th:insert="~{parts/footer :: footer}" style="text-align: center; margin-bottom: 20px;"></div>


</body>
</html>
